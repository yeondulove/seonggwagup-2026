<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>성과급 배분표</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;color:#1c1c1e}
body{margin:0;line-height:1.5}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
.card{width:100%;max-width:360px;text-align:center;border:1px solid #e5e5ea;border-radius:14px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card h1{font-size:20px;margin:0 0 6px}
.sub{color:#636366;font-size:14px;margin:0 0 18px}
#pw{width:100%;box-sizing:border-box;padding:11px 12px;font-size:16px;border:1px solid #c7c7cc;border-radius:8px;margin-bottom:10px}
#btn{width:100%;padding:11px;font-size:15px;border:0;border-radius:8px;background:#0a84ff;color:#fff;cursor:pointer}
#btn:disabled{opacity:.5}
.msg{min-height:18px;font-size:13px;margin:10px 0 0}.msg.err{color:#cf222e}
.foot{color:#8e8e93;font-size:12px;margin-top:14px}
.content{max-width:960px;margin:0 auto;padding:20px 16px 90px}
.content h1{font-size:22px;margin:.2em 0}.content h2{font-size:18px;margin-top:26px}.content h3{font-size:16px;margin-top:22px}
.meta{color:#636366;font-size:13px;margin:.2em 0 1em}
.hint{color:#0a84ff;font-size:12px;font-weight:400}
.tbl{overflow-x:auto;margin:10px 0}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{border:1px solid #d9d9de;padding:7px 9px}th{background:#f5f5f7}
td.r,th.r{text-align:right}
tr.sub td{background:#fafafa;font-weight:600}tr.tot td{background:#eef4ff;font-weight:700}
.pool{margin:14px 0 2px;font-weight:600;color:#1c1c1e}
select.g{font-size:14px;padding:3px 6px;border:1px solid #c7c7cc;border-radius:6px;background:#fff}
.ok{color:#1a7f37;font-weight:700}.warn{color:#cf222e;font-weight:700}
.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e5ea;padding:10px 16px;z-index:5}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.toolbar button{background:#e5e5ea;color:#1c1c1e;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
details.crit{margin-top:26px;border-top:1px solid #e5e5ea;padding-top:10px}summary{cursor:pointer;color:#636366}
@media print{.bar,.toolbar,select.g{} select.g{border:0;-webkit-appearance:none;appearance:none}}
</style></head><body>

function u8(b){var s=atob(b);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}

async function tryDec(blob,pw){

}
function allocate(weights,fund){
  var total=0,i;for(i=0;i<weights.length;i++)total+=weights[i];
  var res=[];if(total<=0){for(i=0;i<weights.length;i++)res.push(0);return res;}
  var raw=[],fl=[],used=0;for(i=0;i<weights.length;i++){var x=fund*weights[i]/total;raw.push(x);var f=Math.floor(x);fl.push(f);used+=f;}
  var rem=Math.round(fund)-used;
  var ord=[];for(i=0;i<weights.length;i++)ord.push({i:i,frac:raw[i]-Math.floor(raw[i]),pos:weights[i]>0});
  ord.sort(function(a,b){return b.frac-a.frac;});
  res=fl.slice();var k=0,guard=0;

  return res;

function bindAdmin(){var c=document.getElementById("content");var ins=c.querySelectorAll("input.an");for(var i=0;i<ins.length;i++)ins[i].addEventListener("input",recomputeAdmin);var sels=c.querySelectorAll("select.ag");for(i=0;i<sels.length;i++)sels[i].addEventListener("change",recomputeAdmin);var chks=c.querySelectorAll("input.ac");for(i=0;i<chks.length;i++)chks[i].addEventListener("change",recomputeAdmin);}
function recomputeAdmin(){var d=CURRENT;
  var profitRatio=pnum("p_profitRatio")/100,memberShare=pnum("p_memberShare")/100,leadShare=pnum("p_leadShare")/100;
  var W={S:pnum("p_wS"),A:pnum("p_wA"),B:pnum("p_wB"),C:pnum("p_wC"),D:pnum("p_wD")};
  function wg(g){var x=W[String(g).toUpperCase()];return x==null?0:x;}
  var aH=pnum("p_allocHead")/100,aL=pnum("p_allocLabor")/100,aP=pnum("p_allocProfit")/100;
  var teams=d.teams,info=[],totLabor=0,totProfit=0,totHead=0,ti,pi,mi;
  for(ti=0;ti<teams.length;ti++){var labor=pnum("t_"+ti+"_labor"),profit=pnum("t_"+ti+"_profit"),head=0;for(pi=0;pi<teams[ti].pools.length;pi++)head+=teams[ti].pools[pi].members.length;info.push({labor:labor,profit:profit,head:head});totLabor+=labor;totProfit+=profit;totHead+=head;}
  function chk(id){var e=document.getElementById(id);return e&&e.checked;}
  function setVal(id,v){var e=document.getElementById(id);if(e&&document.activeElement!==e)e.value=fmt(v);}
  var annualProfit=totProfit,totalFund,memberFund,leadFund;
  if(d.scope){memberFund=pnum("s_member");leadFund=pnum("s_lead");}
  else{if(chk("k_profit"))annualProfit=pnum("c_profit");else{annualProfit=totProfit;setVal("c_profit",annualProfit);}if(chk("k_total"))totalFund=pnum("c_total");else{totalFund=Math.round(annualProfit*profitRatio);setVal("c_total",totalFund);}if(chk("k_member"))memberFund=pnum("c_member");else{memberFund=Math.round(totalFund*memberShare);setVal("c_member",memberFund);}if(chk("k_lead"))leadFund=pnum("c_lead");else{leadFund=Math.round(totalFund*leadShare);setVal("c_lead",leadFund);}}
  var ratios=[],rsum=1,teamFunds=[];
  if(d.scope){var cH=pnum("s_head")||1,cL=pnum("s_labor")||1,cP=pnum("s_profit")||1;for(ti=0;ti<teams.length;ti++){var rr=aH*(info[ti].head/cH)+aL*(info[ti].labor/cL)+aP*(info[ti].profit/cP);ratios.push(rr);teamFunds.push(Math.round(memberFund*rr));}}
  else{for(ti=0;ti<teams.length;ti++){var r=aH*(totHead?info[ti].head/totHead:0)+aL*(totLabor?info[ti].labor/totLabor:0)+aP*(totProfit?info[ti].profit/totProfit:0);ratios.push(r);}rsum=0;for(ti=0;ti<ratios.length;ti++)rsum+=ratios[ti];if(rsum===0)rsum=1;teamFunds=largestRemainder(ratios.map(function(r){return memberFund*r/rsum;}),memberFund);}
  var sumTF=0;for(var u=0;u<teamFunds.length;u++)sumTF+=teamFunds[u];
  var grandMember=0;
  for(ti=0;ti<teams.length;ti++){setT("t_"+ti+"_ratio",((d.scope?ratios[ti]:ratios[ti]/rsum)*100).toFixed(2)+"%");setT("t_"+ti+"_fund",fmt(teamFunds[ti]));
    var head=info[ti].head;var poolHeads=teams[ti].pools.map(function(p){return p.members.length;});var poolReal=poolHeads.map(function(ph){return head?teamFunds[ti]*ph/head:0;});var poolFunds=largestRemainder(poolReal,teamFunds[ti]);
    var flat=0,tsum=0;
    for(pi=0;pi<teams[ti].pools.length;pi++){var pool=teams[ti].pools[pi];setT("plf_"+ti+"_"+pi,fmt(poolFunds[pi]));
      var flats=[],grades=[];for(mi=0;mi<pool.members.length;mi++){var sel=document.getElementById("sm_"+ti+"_"+flat);grades.push(sel?sel.value:pool.members[mi].grade);flats.push(flat);flat++;}
      var weights=grades.map(function(g){return wg(g);});var amt=allocate(weights,poolFunds[pi]);var psub=0;
      for(mi=0;mi<flats.length;mi++){setT("mw_"+ti+"_"+flats[mi],weights[mi]);setT("mp_"+ti+"_"+flats[mi],fmt(amt[mi]));psub+=amt[mi];}
      setT("psub_"+ti+"_"+pi,fmt(psub));tsum+=psub;}
    setT("tsub_"+ti,fmt(tsum));grandMember+=tsum;}
  var leads=d.leads,comps=[],li;for(li=0;li<leads.length;li++){if(comps.indexOf(leads[li].company)<0)comps.push(leads[li].company);}
  var totLeads=d.scope?(pnum("s_leads")||1):leads.length;var compCounts=comps.map(function(cp){var n=0;for(var k=0;k<leads.length;k++)if(leads[k].company===cp)n++;return n;});
  var compFundReal=compCounts.map(function(n){return totLeads?leadFund*n/totLeads:0;});var cfTarget=0;for(var z=0;z<compFundReal.length;z++)cfTarget+=compFundReal[z];var compFunds=largestRemainder(compFundReal,Math.round(cfTarget));var sumCF=0;for(var z2=0;z2<compFunds.length;z2++)sumCF+=compFunds[z2];
  var grandLead=0;for(var ci=0;ci<comps.length;ci++){var idxs=[];for(li=0;li<leads.length;li++)if(leads[li].company===comps[ci])idxs.push(li);
    var lw=idxs.map(function(ix){var sel=document.getElementById("lg_"+ix);return wg(sel?sel.value:leads[ix].grade);});var lamt=allocate(lw,compFunds[ci]);
    for(var q=0;q<idxs.length;q++){setT("lw_"+idxs[q],lw[q]);setT("lp_"+idxs[q],fmt(lamt[q]));grandLead+=lamt[q];}}
  setT("lsubAll",fmt(grandLead));
  var memT=d.scope?sumTF:memberFund,leadT=d.scope?sumCF:leadFund;
  var mOk=grandMember===memT,lOk=grandLead===leadT;
  setTC("gMember",(mOk?"OK ":"차이 ")+fmt(grandMember)+(mOk?"":" / 기준 "+fmt(memT)),mOk?"r ok":"r warn");
  setTC("gLead",(lOk?"OK ":"차이 ")+fmt(grandLead)+(lOk?"":" / 기준 "+fmt(leadT)),lOk?"r ok":"r warn");
}

  for(var li=0;li<d.leads.length;li++){var ld=d.leads[li];L.push(["리드",ld.name,ld.company,document.getElementById("lg_"+li).value,document.getElementById("lw_"+li).textContent,document.getElementById("lp_"+li).textContent].join("\t"));}
