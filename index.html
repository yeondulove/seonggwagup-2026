<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>성과급 배분표</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;color:#1c1c1e}
body{margin:0;line-height:1.5}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
.card{width:100%;max-width:360px;text-align:center;border:1px solid #e5e5ea;border-radius:14px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.card h1{font-size:20px;margin:0 0 6px}
.sub{color:#636366;font-size:14px;margin:0 0 18px}
#pw{width:100%;box-sizing:border-box;padding:11px 12px;font-size:16px;border:1px solid #c7c7cc;border-radius:8px;margin-bottom:10px}
#btn{width:100%;padding:11px;font-size:15px;border:0;border-radius:8px;background:#0a84ff;color:#fff;cursor:pointer}
#btn:disabled{opacity:.5}
.msg{min-height:18px;font-size:13px;margin:10px 0 0}.msg.err{color:#cf222e}
.foot{color:#8e8e93;font-size:12px;margin-top:14px}
.content{max-width:960px;margin:0 auto;padding:20px 16px 90px}
.content h1{font-size:22px;margin:.2em 0}.content h2{font-size:18px;margin-top:26px}.content h3{font-size:16px;margin-top:22px}
.meta{color:#636366;font-size:13px;margin:.2em 0 1em}
.hint{color:#0a84ff;font-size:12px;font-weight:400}
.tbl{overflow-x:auto;margin:10px 0}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th,td{border:1px solid #d9d9de;padding:7px 9px}th{background:#f5f5f7}
td.r,th.r{text-align:right}
tr.sub td{background:#fafafa;font-weight:600}tr.tot td{background:#eef4ff;font-weight:700}
.pool{margin:14px 0 2px;font-weight:600;color:#1c1c1e}
select.g{font-size:14px;padding:3px 6px;border:1px solid #c7c7cc;border-radius:6px;background:#fff}
.ok{color:#1a7f37;font-weight:700}.warn{color:#cf222e;font-weight:700}
.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e5ea;padding:10px 16px;z-index:5}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.toolbar button{background:#e5e5ea;color:#1c1c1e;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
details.crit{margin-top:26px;border-top:1px solid #e5e5ea;padding-top:10px}summary{cursor:pointer;color:#636366}
@media print{.bar,.toolbar,select.g{} select.g{border:0;-webkit-appearance:none;appearance:none}}
</style></head><body>

</div></div>

var ITER=150000;var ENC=new TextEncoder();
var WEIGHT={S:4,A:3,B:2,C:1,D:0};var GRADES=["S","A","B","C","D"];
var CURRENT=null,ORIGINAL=null;
function u8(b){var s=atob(b);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
function gw(g){return WEIGHT[String(g).toUpperCase()]||0;}
function fmt(n){n=Math.round(n);var sg=n<0?"-":"";n=Math.abs(n);return sg+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function esc(t){return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
async function tryDec(blob,pw){
  var km=await crypto.subtle.importKey("raw",ENC.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:u8(blob.s),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u8(blob.i)},key,u8(blob.c));
  return new TextDecoder().decode(pt);
}
function allocate(weights,fund){
  var total=0,i;for(i=0;i<weights.length;i++)total+=weights[i];
  var res=[];if(total<=0){for(i=0;i<weights.length;i++)res.push(0);return res;}
  var raw=[],fl=[],used=0;for(i=0;i<weights.length;i++){var x=fund*weights[i]/total;raw.push(x);var f=Math.floor(x);fl.push(f);used+=f;}
  var rem=Math.round(fund)-used;
  var ord=[];for(i=0;i<weights.length;i++)ord.push({i:i,frac:raw[i]-Math.floor(raw[i]),pos:weights[i]>0});
  ord.sort(function(a,b){return b.frac-a.frac;});
  res=fl.slice();var k=0,guard=0;
  while(rem>0&&guard<weights.length*5){var c=ord[k%ord.length];if(c.pos){res[c.i]+=1;rem--;}k++;guard++;}
  return res;
}
function gradeSelect(idx,cur){var s="<select data-i='"+idx+"' class='g'>";for(var j=0;j<GRADES.length;j++){var g=GRADES[j];s+="<option value='"+g+"'"+(g===String(cur).toUpperCase()?" selected":"")+">"+g+"</option>";}return s+"</select>";}
function poolIdxs(p){var a=[];for(var m=0;m<CURRENT.members.length;m++)if(CURRENT.members[m].pool===p)a.push(m);return a;}
function renderTeam(d){
  var h="<h1>"+esc(d.team)+"</h1>";

    for(var i=0;i<d.basis.length;i++)h+="<tr><td>"+esc(d.basis[i][0])+"</td><td class='r'>"+esc(d.basis[i][1])+"</td><td>"+esc(d.basis[i][2])+"</td></tr>";
    h+="</tbody></table></div>";}
  h+="<h3>② 구성원 개인별 성과급 <span class='hint'>(성과등급 선택 시 자동 계산)</span></h3>";
  for(var p=0;p<d.pools.length;p++){var pool=d.pools[p];
    if(pool.label)h+="<div class='pool'>["+esc(pool.label)+"] 파트 재원: "+fmt(pool.fund)+"</div>";
    h+="<div class='tbl'><table><thead><tr><th>이름</th><th>직책</th><th>잡레벨</th><th>성과등급</th><th class='r'>가중치</th><th class='r'>적용 재원</th><th class='r'>성과급</th></tr></thead><tbody>";
    var idxs=poolIdxs(p);
    for(var q=0;q<idxs.length;q++){var m=idxs[q],mb=d.members[m];
      h+="<tr data-m='"+m+"'><td>"+esc(mb.name)+"</td><td>"+esc(mb.role)+"</td><td>"+esc(mb.level)+"</td><td>"+gradeSelect(m,mb.grade)+"</td><td class='r w'></td><td class='r'>"+fmt(pool.fund)+"</td><td class='r pay'></td></tr>";}
    h+="<tr class='sub'><td colspan='6'>파트 소계</td><td class='r psub' data-pool='"+p+"'></td></tr></tbody></table></div>";}

}

function totalsBlock(){return "<div class='tbl'><table><tbody><tr class='tot'><td>지급 합계</td><td class='r' id='grand'></td></tr><tr><td>검증: 지급 합계 = 재원 합계</td><td class='r' id='verify'></td></tr></tbody></table></div>";}
function toolbar(){return "<div class='toolbar'><button onclick='copyResult()'>결과 복사(엑셀 붙여넣기)</button><button onclick='window.print()'>인쇄 / PDF</button><button onclick='resetGrades()'>입력 초기화</button><button onclick='location.reload()'>잠그기</button></div>";}
function recalc(){var d=CURRENT,grand=0,fundSum=0;
  for(var p=0;p<d.pools.length;p++){fundSum+=d.pools[p].fund;var idxs=poolIdxs(p);
    var weights=idxs.map(function(m){return gw(d.members[m].grade);});var amt=allocate(weights,d.pools[p].fund);var psub=0;
    for(var q=0;q<idxs.length;q++){var m=idxs[q];var row=document.querySelector("tr[data-m='"+m+"']");
      row.querySelector(".w").textContent=gw(d.members[m].grade);row.querySelector(".pay").textContent=fmt(amt[q]);psub+=amt[q];}
    var ps=document.querySelector(".psub[data-pool='"+p+"']");if(ps)ps.textContent=fmt(psub);grand+=psub;}
  document.getElementById("grand").textContent=fmt(grand);
  var ok=grand===Math.round(fundSum);var v=document.getElementById("verify");
  v.textContent=ok?("OK ("+fmt(fundSum)+")"):("차이 "+fmt(grand-fundSum)+" — 모든 등급이 D이면 미배분");v.className="r "+(ok?"ok":"warn");
}
function onGrade(e){var i=+e.target.getAttribute("data-i");CURRENT.members[i].grade=e.target.value;recalc();persist();}
function storeKey(){return "sgg_"+(CURRENT.key||CURRENT.team||"x");}
function persist(){try{var o={};for(var m=0;m<CURRENT.members.length;m++)o[m]=CURRENT.members[m].grade;localStorage.setItem(storeKey(),JSON.stringify(o));}catch(e){}}
function loadPersist(){try{var s=localStorage.getItem(storeKey());if(s){var o=JSON.parse(s);for(var m in o){if(CURRENT.members[m])CURRENT.members[m].grade=o[m];}}}catch(e){}}
function resetGrades(){try{localStorage.removeItem(storeKey());}catch(e){}for(var i=0;i<CURRENT.members.length;i++)CURRENT.members[i].grade=ORIGINAL[i];show(CURRENT);}
function copyResult(){var d=CURRENT,L=[];var ex=d.type==="exec";
  L.push(["이름",ex?"계열사":"직책",ex?"직책":"잡레벨","성과등급","가중치","적용재원","성과급"].join("\t"));
  for(var p=0;p<d.pools.length;p++){var idxs=poolIdxs(p);var weights=idxs.map(function(m){return gw(d.members[m].grade);});var amt=allocate(weights,d.pools[p].fund);
    for(var q=0;q<idxs.length;q++){var mb=d.members[idxs[q]];L.push([mb.name,(ex?mb.company:mb.role)||"",(ex?mb.role:mb.level)||"",String(mb.grade).toUpperCase(),gw(mb.grade),d.pools[p].fund,amt[q]].join("\t"));}}
  var txt=L.join("\n");
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){alert("결과를 복사했습니다. 엑셀/시트에 붙여넣기 하세요.");},function(){window.prompt("아래 내용을 직접 복사하세요(Ctrl+C):",txt);});}

}

function setT(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function setTC(id,t,cls){var e=document.getElementById(id);if(e){e.textContent=t;e.className=cls;}}
function largestRemainder(real,target){var fl=real.map(function(x){return Math.floor(x);});var used=0,i;for(i=0;i<fl.length;i++)used+=fl[i];var rem=Math.round(target)-used;var ord=real.map(function(x,ix){return {ix:ix,frac:x-Math.floor(x)};}).sort(function(a,b){return b.frac-a.frac;});var res=fl.slice(),k=0,guard=0;while(rem>0&&ord.length&&guard<real.length*5){res[ord[k%ord.length].ix]+=1;rem--;k++;guard++;}return res;}
function ni(id,val){return "<input id='"+id+"' class='an' type='text' value='"+fmt(val)+"' style='width:120px;text-align:right'>";}
function gsel(id,cur){var s="<select id='"+id+"' class='ag'>";for(var j=0;j<GRADES.length;j++){var g=GRADES[j];s+="<option"+(g===String(cur).toUpperCase()?" selected":"")+">"+g+"</option>";}return s+"</select>";}

    h+="<tr><td>전체 구성원 재원</td><td class='r'>"+ni("s_member",d.comp.memberFund)+"</td><td>전체 리드 재원</td><td class='r'>"+ni("s_lead",d.comp.leadFund)+"</td><td>전체 리드 수</td><td class='r'>"+ni("s_leads",d.comp.leads)+"</td></tr>";
    h+="</tbody></table></div>";
  }else{
    h+="<h3>재원 산정 <span class='hint'>(자동 / [직접입력] 체크 시 수동 설정)</span></h3><div class='tbl'><table><thead><tr><th>항목</th><th class='r'>값</th><th>직접입력</th></tr></thead><tbody>";
    h+="<tr><td>연간 순이익 (=Σ부서순이익)</td><td class='r'><input id='c_profit' class='an' type='text' style='width:150px;text-align:right'></td><td><input type='checkbox' id='k_profit' class='ac'></td></tr>";
    h+="<tr><td>총재원</td><td class='r'><input id='c_total' class='an' type='text' style='width:150px;text-align:right'></td><td><input type='checkbox' id='k_total' class='ac'></td></tr>";
    h+="<tr><td>구성원 재원</td><td class='r'><input id='c_member' class='an' type='text' style='width:150px;text-align:right'></td><td><input type='checkbox' id='k_member' class='ac'></td></tr>";
    h+="<tr><td>리드 재원</td><td class='r'><input id='c_lead' class='an' type='text' style='width:150px;text-align:right'></td><td><input type='checkbox' id='k_lead' class='ac'></td></tr>";

  }
  h+="<h2>팀별 (구성원)</h2>";

    h+="<h3>"+esc(t.name)+" <span class='hint'>("+esc(t.company)+")</span></h3>";
    h+="<div class='tbl'><table><tbody><tr><td>연간 인건비</td><td class='r'>"+ni("t_"+ti+"_labor",t.labor)+"</td><td>부서 순이익</td><td class='r'>"+ni("t_"+ti+"_profit",t.profit)+"</td><td>팀 배분비율(전사)</td><td class='r' id='t_"+ti+"_ratio'></td><td>팀 재원</td><td class='r' id='t_"+ti+"_fund'></td></tr></tbody></table></div>";
    var flat=0;
    for(var pi=0;pi<t.pools.length;pi++){var pool=t.pools[pi];
      if(pool.label)h+="<div class='pool'>["+esc(pool.label)+"] 파트 재원: <span id='plf_"+ti+"_"+pi+"'></span></div>";
      h+="<div class='tbl'><table><thead><tr><th>이름</th><th>직책</th><th>잡레벨</th><th>성과등급</th><th class='r'>가중치</th><th class='r'>성과급</th></tr></thead><tbody>";
      for(var mi=0;mi<pool.members.length;mi++){var m=pool.members[mi];
        h+="<tr><td>"+esc(m.name)+"</td><td>"+esc(m.role)+"</td><td>"+esc(m.level)+"</td><td>"+gsel("sm_"+ti+"_"+flat,m.grade)+"</td><td class='r' id='mw_"+ti+"_"+flat+"'></td><td class='r' id='mp_"+ti+"_"+flat+"'></td></tr>";flat++;}
      h+="<tr class='sub'><td colspan='5'>파트 소계</td><td class='r' id='psub_"+ti+"_"+pi+"'></td></tr></tbody></table></div>";}
    h+="<div class='tbl'><table><tbody><tr class='tot'><td>팀 지급 합계</td><td class='r' id='tsub_"+ti+"'></td></tr></tbody></table></div>";}
  h+="<h2>리드(팀장)</h2><div class='tbl'><table><thead><tr><th>이름</th><th>계열사</th><th>직책</th><th>성과등급</th><th class='r'>가중치</th><th class='r'>성과급</th></tr></thead><tbody>";
  for(var li=0;li<d.leads.length;li++){var ld=d.leads[li];h+="<tr><td>"+esc(ld.name)+"</td><td>"+esc(ld.company)+"</td><td>"+esc(ld.role)+"</td><td>"+gsel("lg_"+li,ld.grade)+"</td><td class='r' id='lw_"+li+"'></td><td class='r' id='lp_"+li+"'></td></tr>";}
  h+="<tr class='tot'><td colspan='5'>리드 지급 합계</td><td class='r' id='lsubAll'></td></tr></tbody></table></div>";
  h+="<div class='tbl'><table><tbody><tr class='tot'><td>구성원 지급 합계 / 검증</td><td class='r' id='gMember'></td></tr><tr class='tot'><td>리드 지급 합계 / 검증</td><td class='r' id='gLead'></td></tr></tbody></table></div>";
  h+="<div class='toolbar'><button onclick='copyAdmin()'>전체 결과 복사</button><button onclick='window.print()'>인쇄 / PDF</button><button onclick='location.reload()'>잠그기</button></div>";
  h+=CRITERIA_HTML;return h;}
function bindAdmin(){var c=document.getElementById("content");var ins=c.querySelectorAll("input.an");for(var i=0;i<ins.length;i++)ins[i].addEventListener("input",recomputeAdmin);var sels=c.querySelectorAll("select.ag");for(i=0;i<sels.length;i++)sels[i].addEventListener("change",recomputeAdmin);var chks=c.querySelectorAll("input.ac");for(i=0;i<chks.length;i++)chks[i].addEventListener("change",recomputeAdmin);}
function recomputeAdmin(){var d=CURRENT;
  var profitRatio=pnum("p_profitRatio")/100,memberShare=pnum("p_memberShare")/100,leadShare=pnum("p_leadShare")/100;
  var W={S:pnum("p_wS"),A:pnum("p_wA"),B:pnum("p_wB"),C:pnum("p_wC"),D:pnum("p_wD")};
  function wg(g){var x=W[String(g).toUpperCase()];return x==null?0:x;}
  var aH=pnum("p_allocHead")/100,aL=pnum("p_allocLabor")/100,aP=pnum("p_allocProfit")/100;
  var teams=d.teams,info=[],totLabor=0,totProfit=0,totHead=0,ti,pi,mi;
  for(ti=0;ti<teams.length;ti++){var labor=pnum("t_"+ti+"_labor"),profit=pnum("t_"+ti+"_profit"),head=0;for(pi=0;pi<teams[ti].pools.length;pi++)head+=teams[ti].pools[pi].members.length;info.push({labor:labor,profit:profit,head:head});totLabor+=labor;totProfit+=profit;totHead+=head;}
  function chk(id){var e=document.getElementById(id);return e&&e.checked;}
  function setVal(id,v){var e=document.getElementById(id);if(e&&document.activeElement!==e)e.value=fmt(v);}
  var annualProfit=totProfit,totalFund,memberFund,leadFund;
  if(d.scope){memberFund=pnum("s_member");leadFund=pnum("s_lead");}
  else{if(chk("k_profit"))annualProfit=pnum("c_profit");else{annualProfit=totProfit;setVal("c_profit",annualProfit);}if(chk("k_total"))totalFund=pnum("c_total");else{totalFund=Math.round(annualProfit*profitRatio);setVal("c_total",totalFund);}if(chk("k_member"))memberFund=pnum("c_member");else{memberFund=Math.round(totalFund*memberShare);setVal("c_member",memberFund);}if(chk("k_lead"))leadFund=pnum("c_lead");else{leadFund=Math.round(totalFund*leadShare);setVal("c_lead",leadFund);}}
  var ratios=[],rsum=1,teamFunds=[];
  if(d.scope){var cH=pnum("s_head")||1,cL=pnum("s_labor")||1,cP=pnum("s_profit")||1;for(ti=0;ti<teams.length;ti++){var rr=aH*(info[ti].head/cH)+aL*(info[ti].labor/cL)+aP*(info[ti].profit/cP);ratios.push(rr);teamFunds.push(Math.round(memberFund*rr));}}
  else{for(ti=0;ti<teams.length;ti++){var r=aH*(totHead?info[ti].head/totHead:0)+aL*(totLabor?info[ti].labor/totLabor:0)+aP*(totProfit?info[ti].profit/totProfit:0);ratios.push(r);}rsum=0;for(ti=0;ti<ratios.length;ti++)rsum+=ratios[ti];if(rsum===0)rsum=1;teamFunds=largestRemainder(ratios.map(function(r){return memberFund*r/rsum;}),memberFund);}
  var sumTF=0;for(var u=0;u<teamFunds.length;u++)sumTF+=teamFunds[u];
  var grandMember=0;
  for(ti=0;ti<teams.length;ti++){setT("t_"+ti+"_ratio",((d.scope?ratios[ti]:ratios[ti]/rsum)*100).toFixed(2)+"%");setT("t_"+ti+"_fund",fmt(teamFunds[ti]));
    var head=info[ti].head;var poolHeads=teams[ti].pools.map(function(p){return p.members.length;});var poolReal=poolHeads.map(function(ph){return head?teamFunds[ti]*ph/head:0;});var poolFunds=largestRemainder(poolReal,teamFunds[ti]);
    var flat=0,tsum=0;
    for(pi=0;pi<teams[ti].pools.length;pi++){var pool=teams[ti].pools[pi];setT("plf_"+ti+"_"+pi,fmt(poolFunds[pi]));
      var flats=[],grades=[];for(mi=0;mi<pool.members.length;mi++){var sel=document.getElementById("sm_"+ti+"_"+flat);grades.push(sel?sel.value:pool.members[mi].grade);flats.push(flat);flat++;}
      var weights=grades.map(function(g){return wg(g);});var amt=allocate(weights,poolFunds[pi]);var psub=0;
      for(mi=0;mi<flats.length;mi++){setT("mw_"+ti+"_"+flats[mi],weights[mi]);setT("mp_"+ti+"_"+flats[mi],fmt(amt[mi]));psub+=amt[mi];}
      setT("psub_"+ti+"_"+pi,fmt(psub));tsum+=psub;}
    setT("tsub_"+ti,fmt(tsum));grandMember+=tsum;}
  var leads=d.leads,comps=[],li;for(li=0;li<leads.length;li++){if(comps.indexOf(leads[li].company)<0)comps.push(leads[li].company);}
  var totLeads=d.scope?(pnum("s_leads")||1):leads.length;var compCounts=comps.map(function(cp){var n=0;for(var k=0;k<leads.length;k++)if(leads[k].company===cp)n++;return n;});
  var compFundReal=compCounts.map(function(n){return totLeads?leadFund*n/totLeads:0;});var cfTarget=0;for(var z=0;z<compFundReal.length;z++)cfTarget+=compFundReal[z];var compFunds=largestRemainder(compFundReal,Math.round(cfTarget));var sumCF=0;for(var z2=0;z2<compFunds.length;z2++)sumCF+=compFunds[z2];
  var grandLead=0;for(var ci=0;ci<comps.length;ci++){var idxs=[];for(li=0;li<leads.length;li++)if(leads[li].company===comps[ci])idxs.push(li);
    var lw=idxs.map(function(ix){var sel=document.getElementById("lg_"+ix);return wg(sel?sel.value:leads[ix].grade);});var lamt=allocate(lw,compFunds[ci]);
    for(var q=0;q<idxs.length;q++){setT("lw_"+idxs[q],lw[q]);setT("lp_"+idxs[q],fmt(lamt[q]));grandLead+=lamt[q];}}
  setT("lsubAll",fmt(grandLead));
  var memT=d.scope?sumTF:memberFund,leadT=d.scope?sumCF:leadFund;
  var mOk=grandMember===memT,lOk=grandLead===leadT;
  setTC("gMember",(mOk?"OK ":"차이 ")+fmt(grandMember)+(mOk?"":" / 기준 "+fmt(memT)),mOk?"r ok":"r warn");
  setTC("gLead",(lOk?"OK ":"차이 ")+fmt(grandLead)+(lOk?"":" / 기준 "+fmt(leadT)),lOk?"r ok":"r warn");
}
function copyAdmin(){var d=CURRENT,L=[];L.push(["구분","이름","계열사/직책","등급","가중치","성과급"].join("\t"));
  for(var ti=0;ti<d.teams.length;ti++){var t=d.teams[ti],flat=0;for(var pi=0;pi<t.pools.length;pi++){for(var mi=0;mi<t.pools[pi].members.length;mi++){var m=t.pools[pi].members[mi];L.push([t.name,m.name,m.role||"",document.getElementById("sm_"+ti+"_"+flat).value,document.getElementById("mw_"+ti+"_"+flat).textContent,document.getElementById("mp_"+ti+"_"+flat).textContent].join("\t"));flat++;}}}
  for(var li=0;li<d.leads.length;li++){var ld=d.leads[li];L.push(["리드",ld.name,ld.company,document.getElementById("lg_"+li).value,document.getElementById("lw_"+li).textContent,document.getElementById("lp_"+li).textContent].join("\t"));}
  var txt=L.join("\n");if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(function(){alert("전체 결과를 복사했습니다. 엑셀/시트에 붙여넣기 하세요.");},function(){window.prompt("아래 내용을 직접 복사하세요:",txt);});else window.prompt("아래 내용을 직접 복사하세요:",txt);}
function show(d){CURRENT=d;var c=document.getElementById("content");
  if(d.type==="admin"){c.innerHTML=renderAdmin(d);bindAdmin();recomputeAdmin();}
  else{ORIGINAL=d.members.map(function(m){return m.grade;});loadPersist();c.innerHTML=(d.type==="exec"?renderExec(d):renderTeam(d));var sels=c.querySelectorAll("select.g");for(var i=0;i<sels.length;i++)sels[i].addEventListener("change",onGrade);recalc();}
  document.getElementById("gate").style.display="none";window.scrollTo(0,0);c.style.display="block";
}
var CRITERIA_HTML="<details class='crit'><summary>배분 기준 보기</summary>"+
  "<h3>등급별 가중치</h3><div class='tbl'><table><thead><tr><th>등급</th><th class='r'>가중치</th></tr></thead><tbody><tr><td>S</td><td class='r'>4</td></tr><tr><td>A</td><td class='r'>3</td></tr><tr><td>B</td><td class='r'>2</td></tr><tr><td>C</td><td class='r'>1</td></tr><tr><td>D</td><td class='r'>0 (대상 제외)</td></tr></tbody></table></div>"+
  "<h3>팀별 재원 배분 비중</h3><p>인원 30% + 인건비 30% + 부서순이익 40%</p>"+
  "<p><b>방식1 (가중치 비례)</b>: 개인 성과급 = 본인 등급가중치 ÷ 파트내 가중치 합계 × 파트 재원. 소문자 등급(a,b,c,s)은 대문자와 동일.</p></details>";
async function unlock(){var pw=document.getElementById("pw").value;if(!pw)return;
  var msg=document.getElementById("msg");msg.className="msg";msg.textContent="확인 중...";document.getElementById("btn").disabled=true;
  for(var i=0;i<BLOBS.length;i++){try{var json=await tryDec(BLOBS[i],pw);var d=JSON.parse(json);show(d);return;}catch(e){}}
  msg.className="msg err";msg.textContent="비밀번호가 올바르지 않습니다.";document.getElementById("btn").disabled=false;
}
window.addEventListener("DOMContentLoaded",function(){
  if(!window.crypto||!crypto.subtle){var m=document.getElementById("msg");m.className="msg err";m.textContent="보안 컨텍스트(https)가 아니어서 복호화할 수 없습니다.";return;}
  document.getElementById("btn").addEventListener("click",unlock);
  document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")unlock();});
});
